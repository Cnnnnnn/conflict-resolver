name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is intentionally excluded for now: the unit-test
        # fixtures in src/test/ hard-code POSIX-style paths ("/repo",
        # "/workspace/...") and `path.relative` returns backslashes on
        # Windows, breaking several snapshots. Adding Windows back is
        # tracked separately — the fixtures need a path-normalisation
        # pass before that becomes meaningful.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        shell: bash
        # Drop package-lock.json: every `resolved` URL points at the
        # author's internal Nexus, which the runner cannot reach.
        # `npm install` regenerates a fresh lockfile against
        # registry.npmjs.org. The regenerated file lives only in the
        # job workspace and is never committed.
        run: |
          rm -f package-lock.json
          npm install --no-audit --registry=https://registry.npmjs.org/
      - name: Check (tsc + vitest)
        shell: bash
        run: npm run check

  package:
    name: package (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # See the test job for the windows exclusion rationale.
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install --no-audit --registry=https://registry.npmjs.org/
      - name: Compile
        shell: bash
        run: npm run compile
      - name: Build VSIX
        shell: bash
        run: npx @vscode/vsce package --no-dependencies
      - name: Upload VSIX (pull request)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.os }}
          path: '*.vsix'
          if-no-files-found: error
          retention-days: 7